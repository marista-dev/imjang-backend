# -------------------------------------------------------
# map.conf — 악성 User-Agent 매핑 (http 블록 레벨)
# nginx alpine 기본 설정이 conf.d/*.conf를 http 블록에서 include
# -------------------------------------------------------
map $http_user_agent $blocked_agent {
    default             0;
    ~*masscan           1;
    ~*nikto             1;
    ~*sqlmap            1;
    ~*nmap              1;
    ~*zgrab             1;
    ~*libwww-perl       1;
    ~*python-requests   1;
    ~*python-urllib     1;
    ~*go-http-client    1;
    ~*libredtail        1;
    ~*(scanner|crawler|exploit|inject|attack|hack) 1;
    ""                  1;
}
