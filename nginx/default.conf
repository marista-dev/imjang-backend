limit_req_zone $binary_remote_addr zone=api_zone:10m rate=10r/s;

server {
    listen 80;
    server_name ddangkun.cloud api.ddangkun.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ddangkun.cloud api.ddangkun.cloud;

    client_max_body_size 50m;

    ssl_certificate /etc/letsencrypt/live/ddangkun.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ddangkun.cloud/privkey.pem;

    if ($blocked_agent) {
        return 444;
    }

    location = /favicon.ico { access_log off; log_not_found off; return 204; }
    location = /robots.txt  { access_log off; log_not_found off; return 200 "User-agent: *\nDisallow: /\n"; }

    location ~* \.(php|php5|phtml|cgi|pl|asp|aspx|jsp)$ { return 444; }
    location ~* /(wp-admin|wp-login|wp-content|wp-includes|wordpress) { return 444; }
    location ~* /(phpmyadmin|pma|myadmin|mysql|mysqladmin) { return 444; }
    location ~* /(vendor|composer|laravel|symfony|drupal|joomla) { return 444; }
    location ~* /(admin|administrator|manager|backend|console|panel) { return 444; }
    location ~* /(shell|webshell|backdoor|cmd|exec|eval) { return 444; }
    location ~* /(config|configuration|setup|install|installer) { return 444; }
    location ~ /\. { return 444; }

    location / {
        limit_req zone=api_zone burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
