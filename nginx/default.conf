server {
    listen 80;
    server_name ddangkun.cloud api.ddangkun.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ddangkun.cloud api.ddangkun.cloud;

    client_max_body_size 50m;

    ssl_certificate /etc/letsencrypt/live/ddangkun.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ddangkun.cloud/privkey.pem;

    # -------------------------------------------------------
    # 악성 User-Agent 차단 (map.conf에서 정의)
    # -------------------------------------------------------
    if ($blocked_agent) {
        return 444;
    }

    # -------------------------------------------------------
    # 악성 봇 경로 차단 (PHP, CMS, 웹쉘, 숨김파일 등)
    # -------------------------------------------------------

    # PHP 및 스크립트 파일 접근
    location ~* \.(php|php5|phtml|cgi|pl|asp|aspx|jsp)$ {
        return 444;
    }

    # WordPress / CMS 경로
    location ~* /(wp-admin|wp-login|wp-content|wp-includes|wordpress) {
        return 444;
    }

    # DB 관리 툴
    location ~* /(phpmyadmin|pma|myadmin|mysql|mysqladmin) {
        return 444;
    }

    # 프레임워크 내부 경로 (vendor, composer 등)
    location ~* /(vendor|composer|laravel|symfony|drupal|joomla) {
        return 444;
    }

    # 관리자 패널 탐색
    location ~* /(admin|administrator|manager|backend|console|panel) {
        return 444;
    }

    # 웹쉘 / 코드 실행 시도
    location ~* /(shell|webshell|backdoor|cmd|exec|eval) {
        return 444;
    }

    # 설치/설정 파일 탐색
    location ~* /(config|configuration|setup|install|installer) {
        return 444;
    }

    # 숨김 파일 접근 차단 (.env, .git, .htaccess 등)
    location ~ /\. {
        return 444;
    }

    # -------------------------------------------------------
    # 실제 서비스 라우팅
    # -------------------------------------------------------
    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
