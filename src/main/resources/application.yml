spring:
  application:
    name: imjang-api

  # 데이터베이스 설정
  datasource:
    url: jdbc:postgresql://localhost:5432/imjang_db
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    
    # HikariCP 설정 (Connection Pool)
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000      # 5분
      max-lifetime: 1800000     # 30분
      connection-timeout: 30000 # 30초
      pool-name: ImjangHikariPool

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        naming:
          physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          batch_versioned_data: true
        cache:
          use_second_level_cache: false
        generate_statistics: false
    show-sql: false
    open-in-view: false

  # 이메일 발송
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
  
  # 파일 업로드 설정
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: imjang-scheduler-

# 서버 설정
server:
  port: 8080
  
  # 압축 설정 (API 응답 크기 최소화)
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024

  # 에러 응답 설정
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: false
        name: JSESSIONID
        path: /

# 로깅 설정
logging:
  level:
    root: INFO
    com.imjang: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  # 로그 패턴
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} ${LOG_LEVEL_PATTERN:-%5p} ${PID:- } --- [%t] %-40.40logger{39} : %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"

  # 파일 출력
  file:
    name: logs/imjang-api.log
  logback:
    rollingpolicy:
      file-name-pattern: logs/imjang-api-%d{yyyy-MM-dd}.%i.log
      max-file-size: 10MB
      max-history: 30

# Swagger/OpenAPI 설정
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
    enabled: true
  show-actuator: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

# 애플리케이션 설정
app:
  upload:
    path: /Users/marista/Desktop/REPO/imjang-backend/uploads/
    max-size: 10485760
  thumbnail:
    width: 300
    height: 300
    format: png
  cleanup:
    retention-days: 30
    batch-size: 100
    enabled: true
# Oracle Object Storage 설정
cloud:
  aws:
    credentials:
      access-key: ${OCI_ACCESS_KEY}
      secret-key: ${OCI_SECRET_KEY}
    s3:
      bucket: ${OCI_BUCKET:imjang-images}
      region: ${OCI_REGION:ap-chuncheon-1}
      endpoint: ${OCI_ENDPOINT}
      namespace: ${OCI_NAMESPACE}
      image-prefix: images/properties
      thumbnail-prefix: thumbnails/properties
    region:
      static: ${OCI_REGION:ap-chuncheon-1}
    stack:
      auto: false

kakao:
  api:
    key: ${KAKAO_API_KEY}
    baseurl: https://dapi.kakao.com
